<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                Edit Blog
            </h2>

            <form
                    th:action="@{/update-blog/{id}(id=${blog.id})}"
                    method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Title
                    </label>

                    <input
                            type="text"
                            name="title"
                            class="form-control"
                            th:value="${blog.title}"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Content
                    </label>

                    <textarea
                            name="content"
                            rows="8"
                            class="form-control"
                            required
                            th:text="${blog.content}">
                    </textarea>

                </div>

                <div class="d-flex gap-2">

                    <button
                            type="submit"
                            class="btn btn-success">

                        Update Blog

                    </button>

                    <a href="/"
                       class="btn btn-secondary">

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
