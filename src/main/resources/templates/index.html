<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Blog App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f5f5f5;
        }

        .blog-card{
            transition:0.3s;
        }

        .blog-card:hover{
            transform:translateY(-3px);
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        My Blog App
    </h1>

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <h3>Create New Blog</h3>

            <form action="/create-blog"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Title
                    </label>

                    <input
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="Enter blog title"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Content
                    </label>

                    <textarea
                            name="content"
                            rows="5"
                            class="form-control"
                            placeholder="Write your blog here..."
                            required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Upload Image
                    </label>

                    <input
                            type="file"
                            name="image"
                            class="form-control">

                </div>

                <button
                        type="submit"
                        class="btn btn-primary">

                    Create Blog

                </button>

            </form>

        </div>

    </div>

    <div th:if="${#lists.isEmpty(blogs)}">

        <div class="alert alert-info">

            No blogs available.

        </div>

    </div>

    <div th:each="blog : ${blogs}">

        <div class="card blog-card shadow-sm mb-4">

            <div class="card-body">

                <h3 th:text="${blog.title}">
                    Blog Title
                </h3>

                <p th:text="${blog.content}">
                    Blog Content
                </p>

                <img th:if="${blog.imageUrl != null}"
                     th:src="${blog.imageUrl}"
                     class="img-fluid rounded mb-3"
                     style="max-height:300px;">

                <hr>

                <div class="d-flex gap-2">

                    <a th:href="@{/edit-blog/{id}(id=${blog.id})}"
                       class="btn btn-warning">

                        Edit

                    </a>

                    <form
                            th:action="@{/delete-blog/{id}(id=${blog.id})}"
                            method="post">

                        <button
                                type="submit"
                                class="btn btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
